<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sullivan Provost Admission Form</title>

<style>

body{
    margin:0;
    padding:30px;
    background:#f4f7fb;
    font-family:Arial, Helvetica, sans-serif;
}

.container{
    max-width:800px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,.15);
}

h1{
    text-align:center;
    color:#004080;
}

h2{
    text-align:center;
    color:#555;
    margin-bottom:30px;
}

label{
    display:block;
    margin-top:15px;
    font-weight:bold;
}

input,select,textarea{
    width:100%;
    padding:12px;
    margin-top:5px;
    border:1px solid #ccc;
    border-radius:6px;
    box-sizing:border-box;
    font-size:16px;
}

button{
    width:100%;
    margin-top:25px;
    background:#0066cc;
    color:white;
    border:none;
    padding:15px;
    font-size:18px;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#004080;
}

</style>

</head>

<body>

<div class="container">

<h1>Sullivan Provost Girls & Boys Secondary School</h1>

<h2>FORM ONE ADMISSION 2027</h2>
<label>Jina Kamili la Mwanafunzi</label>
<input type="text" placeholder="Andika jina kamili">

<label>Jinsia</label>
<select>
    <option>Chagua Jinsia</option>
    <option>Me</option>
    <option>Ke</option>
</select>

<label>Tarehe ya Kuzaliwa</label>
<input type="date">

<label>Shule Uliyotoka</label>
<input type="text" placeholder="Jina la shule">

<label>Mkoa</label>
<input type="text" placeholder="Mfano: Dar es Salaam">

<label>Wilaya</label>
<input type="text" placeholder="Mfano: Kinondoni">

<label>Namba ya Simu ya Mzazi/Mlezi</label>
<input type="tel" placeholder="07XXXXXXXX">

<label>Pakia Picha ya Mwanafunzi</label>
<input type="file">

<h1>Sullivan Provost Girls & Boys Secondary School</h1>
<h2>FORM ONE ADMISSION 2027</h2>

<form>

<label>Picha ya Mwanafunzi</label><br>
<input type="file"><br><br>

<label>Jina Kamili la Mwanafunzi</label><br>
<input type="text" placeholder="Andika jina kamili"><br><br>

<label>Jinsia</label><br>
<select>
    <option>Chagua Jinsia</option>
    <option>Me</option>
    <option>Ke</option>
</select><br><br>

<label>Tarehe ya Kuzaliwa</label><br>
<input type="date"><br><br>

<label>Shule Uliyotoka</label><br>
<input type="text" placeholder="Jina la shule"><br><br>

<label>Mkoa</label><br>
<input type="text" placeholder="Mfano: Dar es Salaam"><br><br>

<label>Wilaya</label><br>
<input type="text" placeholder="Mfano: Kinondoni"><br><br>

<label>Namba ya Simu ya Mzazi/Mlezi</label><br>
<input type="tel" placeholder="07XXXXXXXX"><br><br>

<label>Barua Pepe (Email)</label><br>
<input type="email" placeholder="mfano@gmail.com"><br><br>

<label>Majina ya Mzazi/Mlezi</label><br>
<input type="text" placeholder="Andika jina la mzazi"><br><br>

<label>Anwani ya Makazi</label><br>
<textarea placeholder="Andika anuani yako"></textarea><br><br>

<button type="submit">Tuma Maombi</button>

</form>

</div>






</body>
</html>
